name: Production Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: production-monitor
  cancel-in-progress: true

env:
  PRODUCTION_URL: https://toko-online-general-purpose.vercel.app

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check application liveness
        run: curl --fail --silent --show-error --max-time 20 --retry 2 "$PRODUCTION_URL/api/health"

      - name: Check database readiness
        run: curl --fail --silent --show-error --max-time 20 --retry 2 "$PRODUCTION_URL/api/health/ready"

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Incident] Production health check failed';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            if (!issues.data.some((issue) => issue.title === title)) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `Automated monitoring failed at ${new Date().toISOString()}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nFollow docs/INCIDENT_RUNBOOK.md.`,
              });
            }

      - name: Close recovered incident issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Incident] Production health check failed';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            for (const issue of issues.data.filter((candidate) => candidate.title === title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Health checks recovered at ${new Date().toISOString()}.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
